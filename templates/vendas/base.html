<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tempero na Mesa{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary: #e74c3c;
            --secondary: #c0392b;
            --accent: #f39c12;
        }
        * { box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        .banner-logo {
            background: var(--primary);
            padding: 15px 10px;
            text-align: center;
        }
        .banner-logo h1 {
            color: white;
            font-family: Georgia, serif;
            font-style: italic;
            margin: 0;
            font-size: 1.8rem;
        }
        .navbar-custom {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 2px 15px rgba(0,0,0,0.15);
        }
        .navbar-dark .navbar-nav .nav-link {
            color: white;
            padding: 8px 15px;
        }
        .navbar-dark .navbar-nav .nav-link:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
        .brand-text {
            font-family: Georgia, serif;
            font-style: italic;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .btn-custom {
            background: var(--primary);
            border: none;
            border-radius: 25px;
            padding: 10px 25px;
            color: white;
        }
        .btn-custom:hover {
            background: var(--secondary);
            color: white;
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .price-tag {
            color: var(--primary);
            font-size: 1.4em;
            font-weight: bold;
        }
        .estoque-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        @media (max-width: 576px) {
            .banner-logo h1 { font-size: 1.4rem; }
            .product-image { height: 150px; }
            .card-body { padding: 12px; }
            .price-tag { font-size: 1.1em; }
            h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="banner-logo">
        <h1 class="brand-text">Tempero na Mesa</h1>
    </div>
    
    <nav class="navbar navbar-expand-lg navbar-custom navbar-dark sticky-top">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold brand-text me-2" href="{% url 'produtos' %}">🛒 Tempero na Mesa</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
<div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'produtos' %}">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'carrinho' %}">Carrinho</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cadastro_cliente' %}">Cadastre-se</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'admin_dashboard' %}">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container my-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
