{% extends 'vendas/base.html' %}

{% block title %}Cadastrar Produto - Tempero na Mesa{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header bg-white">
                <h3 class="mb-0">📦 Cadastrar Produto</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Produto *</label>
                        <input type="text" name="nome" class="form-control" placeholder="Ex: Pimenta Dedo de Moça" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição *</label>
                        <textarea name="descricao" class="form-control" rows="2" placeholder="Características do produto..." required></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Preço (R$) *</label>
                            <input type="number" name="preco" step="0.01" class="form-control" placeholder="0,00" required>
                        </div>
                        
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Estoque *</label>
                            <input type="number" name="estoque" class="form-control" placeholder="Qtd" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Foto do Produto</label>
                        <input type="file" name="imagem" class="form-control" accept="image/*">
                        <small class="text-muted">JPG, PNG</small>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-custom">
                            💾 Salvar
                        </button>
                        <a href="{% url 'produtos' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
